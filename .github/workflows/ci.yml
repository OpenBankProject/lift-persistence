name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Install sbt
        run: |
          curl -fL "https://github.com/sbt/sbt/releases/download/v1.10.11/sbt-1.10.11.tgz" | tar xz -C "$HOME"
          echo "$HOME/sbt/bin" >> $GITHUB_PATH

      - name: Run tests (cross-compile 2.12 + 2.13)
        run: sbt -batch "+test"
